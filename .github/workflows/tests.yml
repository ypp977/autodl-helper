name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Ruff
        run: |
          ruff check .

  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install package (editable)
        run: |
          pip install -e .

      - name: Verify package compiles
        run: |
          python -m py_compile $(find autodl_helper -name '*.py')

      - name: Smoke CLI entrypoint
        run: |
          autodl-helper --help

      - name: Smoke main.py entrypoint
        run: |
          python main.py --help

      - name: Smoke module entrypoint
        run: |
          python -m autodl_helper --help

      - name: Smoke example config validation
        run: |
          python main.py config validate --config config.example.yaml

      - name: Smoke test config validation
        run: |
          python main.py config validate --config config.test.yaml

      - name: Run architecture tests
        run: |
          pytest -q tests/architecture

      - name: Run auth tests
        run: |
          pytest -q tests/auth

      - name: Run CLI tests
        run: |
          pytest -q tests/cli

      - name: Run runtime tests
        run: |
          pytest -q tests/runtime

      - name: Run service tests
        run: |
          pytest -q tests/services

      - name: Run storage tests
        run: |
          pytest -q tests/storage

      - name: Run keeper cycle tests
        run: |
          pytest -q tests/tasks/test_keeper.py

      - name: Smoke keeper probe import
        run: |
          python -c "from scripts.keeper_probe import format_probe_line; print(format_probe_line.__name__)"

      - name: Collect keeper probe tests
        run: |
          set +e
          pytest --import-mode=importlib --collect-only -q tests/tasks/test_keeper_probe.py > /tmp/keeper-probe-collect.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            message=$(python - <<'PY'
from pathlib import Path
text = Path('/tmp/keeper-probe-collect.log').read_text(encoding='utf-8', errors='replace')
text = text.replace('%', '%25').replace('\r', '%0D').replace('\n', '%0A')
print(text[:7000])
PY
)
            echo "::error title=Keeper probe collection failed::$message"
            exit "$status"
          fi
          cat /tmp/keeper-probe-collect.log

      - name: Run keeper probe tests
        run: |
          pytest --import-mode=importlib -q tests/tasks/test_keeper_probe.py

      - name: Run scheduled-start task tests
        run: |
          pytest -q tests/tasks/test_scheduled_start.py

      - name: Run task result label tests
        run: |
          pytest -q tests/tasks/test_result_labels.py

      - name: Run UI tests
        run: |
          pytest -q tests/ui

      - name: Run root tests
        run: |
          pytest -q tests/test_config.py tests/test_notify.py
