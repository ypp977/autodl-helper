name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Ruff
        run: |
          ruff check .

  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install package (editable)
        run: |
          pip install -e .

      - name: Verify package compiles
        run: |
          python -m py_compile $(find autodl_helper -name '*.py')

      - name: CLI smoke test
        run: |
          run_smoke() {
            echo "::group::$*"
            set +e
            "$@"
            status=$?
            set -e
            echo "::endgroup::"
            if [ "$status" -ne 0 ]; then
              echo "CLI smoke command failed: $*" >&2
              exit "$status"
            fi
          }

          run_smoke autodl-helper --help
          run_smoke python main.py --help
          run_smoke python -m autodl_helper --help
          run_smoke python main.py config validate --config config.example.yaml
          run_smoke python main.py config validate --config config.test.yaml

      - name: Run tests
        run: |
          pytest -q
