name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Ruff
        run: |
          ruff check .

  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install package (editable)
        run: |
          pip install -e .

      - name: Verify package compiles
        run: |
          python -m py_compile $(find autodl_helper -name '*.py')

      - name: Smoke CLI entrypoint
        run: |
          autodl-helper --help

      - name: Smoke main.py entrypoint
        run: |
          python main.py --help

      - name: Smoke module entrypoint
        run: |
          python -m autodl_helper --help

      - name: Smoke example config validation
        run: |
          python main.py config validate --config config.example.yaml

      - name: Smoke test config validation
        run: |
          python main.py config validate --config config.test.yaml

      - name: Run architecture tests
        run: |
          pytest -q tests/architecture

      - name: Run auth tests
        run: |
          pytest -q tests/auth

      - name: Run CLI tests
        run: |
          pytest -q tests/cli

      - name: Run runtime tests
        run: |
          pytest -q tests/runtime

      - name: Run service tests
        run: |
          pytest -q tests/services

      - name: Run storage tests
        run: |
          pytest -q tests/storage

      - name: Run keeper cycle tests
        run: |
          pytest -q tests/tasks/test_keeper.py

      - name: Run keeper probe tests
        run: |
          pytest -q tests/tasks/test_keeper_probe.py

      - name: Run scheduled-start task tests
        run: |
          pytest -q tests/tasks/test_scheduled_start.py

      - name: Run task result label tests
        run: |
          pytest -q tests/tasks/test_result_labels.py

      - name: Run UI config wizard tests
        run: |
          pytest -q tests/ui/test_config_wizard.py

      - name: Run terminal UI primitive text tests
        run: |
          pytest -q tests/ui/test_ui.py \
            -k "render_dashboard_header or console_primitives or metric_rows or account_status_table"

      - name: Run terminal UI compact dashboard test
        run: |
          set +e
          pytest -q --tb=short tests/ui/test_ui.py \
            -k "compact_keeper" > /tmp/ui-compact.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            message=$(python -c "from pathlib import Path; text = Path('/tmp/ui-compact.log').read_text(encoding='utf-8', errors='replace')[-7000:]; print(text.replace('%', '%25').replace(chr(13), '%0D').replace(chr(10), '%0A'))")
            echo "::error title=Compact dashboard test failed::$message"
            exit "$status"
          fi
          cat /tmp/ui-compact.log

      - name: Run terminal UI service status tests
        run: |
          pytest -q tests/ui/test_ui.py \
            -k "stale_heartbeat or launchd_config_error"

      - name: Run terminal UI keeper dashboard tests
        run: |
          pytest -q tests/ui/test_ui.py \
            -k "keeper_dashboard or refresh_fetches"

      - name: Run terminal UI initial nonblocking tests
        run: |
          pytest -q tests/ui/test_ui.py \
            -k "first_screen or initial_render"

      - name: Run terminal UI refresh tests
        run: |
          pytest -q tests/ui/test_ui.py \
            -k "refresh_updates or refresh_dashboard_snapshot or refresh_submits or refresh_repaints or does_not_build_client or unknown_top_level or grouped_actions or start_daemon or execute_keeper or failure_reason or paused_keeper or disabled_keeper or slow"

      - name: Run terminal UI menu tests
        run: |
          pytest -q tests/ui/test_ui.py \
            -k "keeper_menu or keeper_details or daemon_and_keeper or account_management or add_account or numeric_account or select_account or toggle_edit or config_save or account_menu or health_check"

      - name: Run terminal UI scheduled dashboard tests
        run: |
          pytest -q tests/ui/test_ui.py \
            -k "scheduled_management_is_read_only or scheduled_counts or scheduled_dashboard_batches"

      - name: Run terminal UI scheduled control tests
        run: |
          pytest -q tests/ui/test_ui.py \
            -k "pause_and_resume_single_scheduled or pause_and_resume_all_scheduled or config_disabled_scheduled or no_jobs or disabled_scheduler"

      - name: Run terminal UI keeper resume tests
        run: |
          pytest -q tests/ui/test_ui.py \
            -k "resume_paused_keeper"

      - name: Run root tests
        run: |
          pytest -q tests/test_config.py tests/test_notify.py
